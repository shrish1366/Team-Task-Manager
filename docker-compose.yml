version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projectmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/projectmanager
      JWT_SECRET: your-super-secret-jwt-key
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
    depends_on:
      - postgres

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://server:5000/api
    depends_on:
      - server

volumes:
  postgres_data:
